<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Candidate Library Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f2f4f7;height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px;color:#111}

/* TOP BAR */
#topbar{background:#1a1a2e;color:#eee;padding:9px 18px;display:flex;align-items:center;gap:8px;flex-shrink:0}
#topbar .title{font-size:14px;font-weight:700;color:#fff;white-space:nowrap;margin-right:4px}
#topbar .meta{font-size:12px;color:#888;white-space:nowrap}
#topbar .meta strong{color:#ccc;font-weight:500}
#topbar-actions{margin-left:auto;display:flex;gap:7px;flex-shrink:0}
.btn-sm{padding:4px 12px;border-radius:5px;border:1px solid #3a3a55;cursor:pointer;font-size:12px;background:transparent;color:#bbb;transition:all .15s;text-decoration:none}
.btn-sm:hover{background:#252540;color:#fff;border-color:#5555aa}
.btn-sm.active{background:#252540;color:#fff;border-color:#5555aa}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden}
#main.detail-collapsed #detail{display:none}
#main.detail-collapsed #sidebar{width:auto;flex:1}
#main.detail-collapsed .table-head,#main.detail-collapsed .table-row{grid-template-columns:minmax(150px,1.2fr) minmax(115px,.9fr) 88px minmax(135px,.95fr) minmax(220px,1.5fr) minmax(170px,1.1fr) 70px 78px 14px}
#main.detail-collapsed .optional-col{display:block}

/* LEFT SIDEBAR */
#sidebar{width:340px;background:#fff;border-right:1px solid #e4e7ec;display:flex;flex-direction:column;flex-shrink:0;transition:width .18s}
#sidebar-rail{height:44px;border-bottom:1px solid #f0f2f5;display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0}
#sidebar-title{font-size:12px;color:#667085;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#sidebar-body{border-bottom:1px solid #f0f2f5;padding:10px;flex-shrink:0}
#search-box{width:100%;padding:6px 10px;border:1px solid #e0e4ea;border-radius:5px;font-size:12px;outline:none;color:#333;background:#fafbfc}
#search-box::placeholder{color:#bbb}
#search-box:focus{border-color:#4a90d9;background:#fff}

.panel{border:1px solid #eef1f5;border-radius:7px;margin-top:8px;background:#fff;overflow:hidden}
.panel-head{height:30px;padding:0 8px;display:flex;align-items:center;cursor:pointer;user-select:none}
.panel-title{font-size:10px;font-weight:700;color:#a3adbd;text-transform:uppercase;letter-spacing:.8px}
.panel-caret{margin-left:auto;color:#98a2b3;font-size:11px}
.panel-content{padding:0 8px 8px}
.panel.collapsed .panel-content{display:none}
.panel.collapsed .panel-caret{transform:rotate(-90deg)}
.chip-row{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:3px 9px;border-radius:20px;border:1px solid #ddd;font-size:11px;cursor:pointer;white-space:nowrap;font-weight:500;transition:all .15s;background:#fff;color:#555}
.chip:hover{background:#f5f5f5}
.chip.active{background:#eee;color:#111;border-color:#999;font-weight:600}
.chip.t1.active{background:#2e7d32;color:#fff;border-color:#2e7d32}
.chip.t2.active{background:#1565c0;color:#fff;border-color:#1565c0}
.chip.t3.active{background:#616161;color:#fff;border-color:#616161}
.chip.green.active{background:#2e7d32;color:#fff;border-color:#2e7d32}
.chip.blue.active{background:#1565c0;color:#fff;border-color:#1565c0}
.chip.orange.active{background:#b54708;color:#fff;border-color:#b54708}
.chip.red.active{background:#c62828;color:#fff;border-color:#c62828}
select{width:100%;padding:6px 8px;border:1px solid #e0e4ea;border-radius:5px;font-size:12px;outline:none;color:#333;background:#fafbfc}
select+select{margin-top:7px}
.filter-line{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(0,.9fr);gap:7px}
.filter-hint{font-size:11px;color:#98a2b3;margin-top:7px;line-height:1.45}
.project-select{position:relative;min-width:0}
#project-filter{display:none}
.project-select-toggle{width:100%;height:31px;border:1px solid #e0e4ea;border-radius:5px;background:#fafbfc;color:#333;font-size:12px;text-align:left;padding:0 26px 0 8px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative}
.project-select-toggle:after{content:'⌄';position:absolute;right:8px;top:6px;color:#98a2b3;font-size:12px}
.project-select.open .project-select-toggle{border-color:#4a90d9;background:#fff}
.project-select.open .project-select-toggle:after{transform:rotate(180deg)}
.project-menu{display:none;position:absolute;top:35px;left:0;width:286px;max-width:calc(100vw - 40px);background:#fff;border:1px solid #d9e0ea;border-radius:7px;box-shadow:0 12px 30px rgba(16,24,40,.14);z-index:10;padding:7px}
.project-select.open .project-menu{display:block}
.project-menu-search{width:100%;padding:6px 8px;border:1px solid #e0e4ea;border-radius:5px;font-size:12px;outline:none;color:#333;background:#fafbfc;margin-bottom:6px}
.project-menu-search:focus{border-color:#4a90d9;background:#fff}
.project-list{max-height:196px;overflow:auto;display:flex;flex-direction:column;gap:3px}
.project-option{border:0;background:#fff;color:#344054;border-radius:5px;padding:7px 8px;font-size:12px;cursor:pointer;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.project-option:hover{background:#f5f7fa}
.project-option.active{background:#e8f0fe;color:#175cd3;font-weight:700}
.project-empty{padding:8px;color:#98a2b3;font-size:12px}
.project-name{display:block;overflow:hidden;text-overflow:ellipsis}
.project-date{display:block;font-size:10px;color:#98a2b3;margin-top:2px}

#candidate-list{overflow-y:auto;flex:1;background:#fff}
.candidate-table{min-width:100%;font-size:11px}
.table-head,.table-row{display:grid;grid-template-columns:minmax(112px,1.28fr) minmax(68px,.75fr) 64px 42px 14px;align-items:center;column-gap:7px}
.table-head{position:sticky;top:0;z-index:2;background:#fbfcfe;border-bottom:1px solid #e4e7ec;color:#98a2b3;font-weight:700;padding:7px 10px;text-transform:uppercase;letter-spacing:.4px}
.table-row{cursor:pointer;border-bottom:1px solid #f4f5f7;padding:8px 10px;transition:background .1s;min-height:46px}
.table-row:hover{background:#fafbfd}
.table-row.selected{background:#e8f0fe}
.cell-main{min-width:0}
.cand-name{font-size:12px;font-weight:700;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cand-sub{font-size:11px;color:#8a94a6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.cell-project,.cell-progress,.cell-company,.cell-history,.cell-email,.cell-link,.cell-score{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#667085}
.cell-progress{font-weight:600;color:#175cd3}
.cell-link a{color:#1565c0;text-decoration:none}
.cell-link a:hover{text-decoration:underline}
.cell-score{font-weight:700;color:#111;text-align:right}
.optional-col{display:none}
.cell-progress.unselected{color:#98a2b3}
.cell-progress.interested,.cell-progress.aligned{color:#2e7d32}
.cell-progress.interviewed{color:#b54708}
.status-dot{width:7px;height:7px;border-radius:50%;justify-self:end;background:#dde2ea}
.status-dot.fit{background:#43a047}
.status-dot.unfit{background:#e53935}
.status-dot.email{background:#1565c0}
#sidebar-footer{padding:8px 10px;border-top:1px solid #f0f2f5;color:#98a2b3;font-size:11px;display:flex;justify-content:space-between;flex-shrink:0}

/* RIGHT DETAIL */
#detail{flex:1;overflow-y:auto;padding:20px 24px;background:#f2f4f7}
#detail.empty{display:flex;align-items:center;justify-content:center;color:#bbb;font-size:14px}
.detail-header{display:flex;align-items:center;gap:10px;margin-bottom:5px;flex-wrap:wrap}
.detail-name{font-size:20px;font-weight:700;color:#111;flex-shrink:0}
.li-link{flex-shrink:0;font-size:12px;color:#1565c0;text-decoration:none;white-space:nowrap}
.li-link:hover{text-decoration:underline}
.header-actions{margin-left:auto;display:flex;gap:8px;align-items:center;flex-shrink:0}
.detail-submeta{font-size:12px;color:#777;margin-bottom:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-email{font-size:12px;color:#98a2b3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:320px}
.btn-connect{background:#fff;color:#2e7d32;border:1.5px solid #43a047;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.btn-connect:hover{background:#f1f8f1}
.btn-connect.active{background:#2e7d32;color:#fff;border-color:#2e7d32}
.btn-pending{background:#fff;color:#555;border:1.5px solid #b8c0cc;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.btn-pending:hover{background:#f5f7fa}
.btn-pending.active{background:#616161;color:#fff;border-color:#616161}
.btn-reject{background:#fff;color:#c62828;border:1.5px solid #e53935;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.btn-reject:hover{background:#fdf2f2}
.btn-reject.active{background:#c62828;color:#fff;border-color:#c62828}

.section{background:#fff;border-radius:7px;border:1px solid #e8ecf0;padding:12px 14px;margin-bottom:10px}
.section-title{font-size:10px;font-weight:700;color:#b0b8c4;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.connect-section{margin-bottom:10px}
#connect-msg{width:100%;border:1px solid #e4e8ed;border-radius:5px;padding:9px 11px;font-size:12px;line-height:1.55;resize:vertical;min-height:72px;font-family:inherit;outline:none;color:#333;background:#fafbfc;display:block}
#connect-msg:focus{border-color:#4a90d9;background:#fff}
.char-count{font-size:11px;color:#b8c0cc;text-align:right;margin-top:4px}
.char-count.warn{color:#e67e22}
.char-count.over{color:#e53935}
.action-stack{display:flex;flex-direction:column;gap:6px;align-items:flex-end;max-width:520px}
.action-row{display:flex;gap:8px;align-items:center}
.status-comment-row{display:flex;align-items:center;gap:7px;width:100%}
.progress-select{width:118px;flex:0 0 118px;padding:5px 8px;border:1px solid #d0d8e4;border-radius:5px;background:#fff;color:#344054;font-size:12px;outline:none}
.progress-select:focus{border-color:#4a90d9}
.comment-bar{display:flex;align-items:center;justify-content:flex-end;margin:0;min-width:142px;max-width:160px}
.comment-input{width:154px;flex:0 1 154px;border:1px solid #e0e4ea;border-radius:14px;padding:4px 9px;font-size:11px;outline:none;background:#fafbfc;color:#333}
.comment-input:focus{border-color:#4a90d9;background:#fff}
.two-col{display:flex;gap:10px;margin-bottom:10px}
.two-col .section{flex:1;margin-bottom:0}
.score-inline{font-size:13px;line-height:1.6;display:flex;flex-wrap:wrap;align-items:baseline;gap:2px;margin-bottom:6px}
.score-seg{display:inline-flex;align-items:baseline;gap:3px}
.s-label{color:#888;font-size:12px}
.s-val{font-weight:700;font-size:14px}
.s-val.high{color:#2e7d32}
.s-val.mid{color:#e65100}
.s-val.low{color:#c62828}
.score-dot{color:#d0d8e4;margin:0 5px;font-size:12px}
.reasoning{font-size:11px;color:#96a0b0;line-height:1.55;font-style:italic}
.signal-line{display:flex;align-items:flex-start;gap:6px;margin-bottom:4px;font-size:12px}
.signal-icon{flex-shrink:0;font-weight:700;font-size:11px;margin-top:1px}
.signal-line.match .signal-icon{color:#2e7d32}
.signal-line.match .signal-text{color:#2a2a2a}
.signal-line.miss .signal-icon{color:#c62828}
.signal-line.miss .signal-text{color:#888}

.library-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.library-field{background:#fafbfc;border:1px solid #eef1f5;border-radius:6px;padding:8px;min-width:0}
.library-label{font-size:10px;color:#a3adbd;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.library-value{font-size:12px;color:#344054;line-height:1.45;overflow-wrap:anywhere}
.library-value.strong{font-weight:700;color:#111}
.library-value.green{color:#2e7d32;font-weight:700}
.library-value.orange{color:#b54708;font-weight:700}
.library-value.red{color:#c62828;font-weight:700}
.library-records{display:flex;flex-direction:column;gap:5px}
.library-record{font-size:12px;color:#344054;line-height:1.45;background:#fafbfc;border:1px solid #eef1f5;border-radius:5px;padding:6px 8px}
.library-record.remark{display:flex;align-items:flex-start;gap:8px}
.record-body{min-width:0;flex:1}
.record-label{font-weight:700;color:#667085;margin-right:4px}
.record-time{font-size:10px;color:#98a2b3;margin-top:2px}
.record-remove{border:0;background:transparent;color:#98a2b3;cursor:pointer;font-size:12px;line-height:1;padding:2px}

.exp-list{display:flex;flex-direction:column;gap:10px}
.exp-item{display:flex;gap:10px;align-items:flex-start}
.exp-icon{width:30px;height:30px;background:#e8ecf0;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.exp-icon svg{width:14px;height:14px;fill:none;stroke:#aab4c4;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.exp-body{min-width:0;flex:1}
.exp-company{font-size:12px;font-weight:700;color:#111}
.exp-title{font-size:12px;color:#555;margin-top:1px}
.exp-period{font-size:11px;color:#aab4c4;margin-top:1px}
.exp-desc{font-size:11px;color:#888;margin-top:3px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;white-space:pre-wrap;cursor:help}

/* BOTTOM BAR */
#bottombar{background:#fff;border-top:1px solid #e4e7ec;padding:10px 18px;display:flex;align-items:center;flex-shrink:0}
.cnt-group{display:flex;align-items:baseline;gap:4px}
.cnt-group+.cnt-group{margin-left:18px}
.cnt-label{font-size:13px;color:#96a0b0}
.cnt-val{font-weight:700;font-size:13px}
.cnt-val.green{color:#2e7d32}
.cnt-val.red{color:#c62828}
.cnt-val.gray{color:#888}
#bottombar-btns{margin-left:auto;display:flex;gap:8px}
.btn-export{background:#fff;color:#555;border:1px solid #d0d8e4;padding:7px 15px;border-radius:6px;cursor:pointer;font-size:13px;transition:all .15s}
.btn-export:hover{background:#f5f7fa}
.btn-copy{background:#1a1a2e;color:#fff;border:none;padding:7px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:background .15s}
.btn-copy:hover{background:#2a2a48}
#toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:7px 16px;border-radius:5px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
#toast.show{opacity:1}

@media (max-width:920px){
  #sidebar{width:290px}
  .library-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="topbar">
  <span class="title">LinkedIn Candidate Library</span>
  <span class="meta" id="dashboard-meta">模拟数据 · 候选人库 Demo · 共 <strong>0</strong> 人</span>
  <div id="topbar-actions">
    <button class="btn-sm" id="toggle-detail" onclick="toggleDetail()">收起详情</button>
    <button class="btn-sm" onclick="clearAll()">清除标记</button>
  </div>
</div>

<div id="main">
  <div id="sidebar">
    <div id="sidebar-rail">
      <div id="sidebar-title">候选人库</div>
    </div>
    <div id="sidebar-body">
      <input id="search-box" type="text" placeholder="搜索姓名 / 公司 / 邮箱 / 项目..." oninput="filterList()">
      <div class="panel">
        <div class="panel-head" onclick="togglePanel(this)">
          <span class="panel-title">筛选</span><span class="panel-caret">⌄</span>
        </div>
        <div class="panel-content">
          <div class="filter-line">
            <div class="project-select" id="project-select">
              <input id="project-filter" type="hidden" value="">
              <button class="project-select-toggle" id="project-select-toggle" onclick="toggleProjectSelect(event)">全部项目</button>
              <div class="project-menu" onclick="event.stopPropagation()">
                <input class="project-menu-search" id="project-menu-search" placeholder="搜索项目" oninput="renderProjectList()">
                <div class="project-list" id="project-list"></div>
              </div>
            </div>
            <select id="progress-filter" onchange="filterList()"></select>
          </div>
          <div class="filter-hint">项目支持搜索；最高到达进度和搜索词会同时生效。</div>
        </div>
      </div>
    </div>
    <div id="candidate-list"></div>
    <div id="sidebar-footer"><span id="result-count">0 / 0</span><span id="active-view-label">候选人表格</span></div>
  </div>

  <div id="detail" class="empty">← 从左侧选择候选人</div>
</div>

<div id="bottombar">
  <div class="cnt-group"><span class="cnt-label">合适</span><span class="cnt-val green" id="cnt-fit">0</span></div>
  <div class="cnt-group"><span class="cnt-label">待定</span><span class="cnt-val gray" id="cnt-pending">0</span></div>
  <div class="cnt-group"><span class="cnt-label">不合适</span><span class="cnt-val red" id="cnt-unfit">0</span></div>
  <div id="bottombar-btns">
    <button class="btn-export" onclick="exportDecisions()">导出当前视图</button>
    <button class="btn-copy" onclick="copyFitList()">复制合适名单</button>
  </div>
</div>

<div id="toast"></div>

function init() {
  renderProjectList();
  fillSelect('progress-filter', [['all','全部进度'], ...Object.entries(progressLabels).map(([k, v]) => [k, v])]);
  document.getElementById('dashboard-meta').innerHTML = `模拟数据 · 候选人库 Demo · 共 <strong>${CANDIDATES.length}</strong> 人`;
  renderList();
  if (currentVanity) selectCandidate(currentVanity);
}

function renderProjectList() {
  const selected = document.getElementById('project-filter')?.value || '';
  const q = document.getElementById('project-menu-search')?.value.trim().toLowerCase() || '';
  const projects = unique(CANDIDATES.map(c => c.project));
  const visible = projects.filter(project => !q || project.toLowerCase().includes(q) || projectDateText(project).toLowerCase().includes(q));
  const projectOptionsHtml = visible.map(project => `<button class="project-option ${selected === project ? 'active' : ''}" title="${esc(projectOptionText(project))}" onclick="setProjectFilter('${escAttr(project)}')"><span class="project-name">${esc(shortProject(project))}</span><span class="project-date">${esc(projectDateText(project))}</span></button>`).join('');
  document.getElementById('project-select-toggle').textContent = selected ? projectOptionText(selected) : '全部项目';
  document.getElementById('project-list').innerHTML = [
    `<button class="project-option ${!selected ? 'active' : ''}" onclick="setProjectFilter('')"><span class="project-name">全部项目</span><span class="project-date">所有项目日期</span></button>`,
    projectOptionsHtml || '<div class="project-empty">没有匹配项目</div>'
  ].join('');
}

function setProjectFilter(project) {
  document.getElementById('project-filter').value = project;
  const search = document.getElementById('project-menu-search');
  if (search) search.value = '';
  document.getElementById('project-select')?.classList.remove('open');
  renderProjectList();
  filterList();
}

function toggleProjectSelect(event) {
  event.stopPropagation();
  const box = document.getElementById('project-select');
  const nextOpen = !box.classList.contains('open');
  box.classList.toggle('open', nextOpen);
  renderProjectList();
  if (nextOpen) setTimeout(() => document.getElementById('project-menu-search')?.focus(), 0);
}

document.addEventListener('click', () => {
  document.getElementById('project-select')?.classList.remove('open');
});

function fillSelect(id, options) {
  document.getElementById(id).innerHTML = options.map(([value, label]) => `<option value="${esc(value)}">${esc(label)}</option>`).join('');
}

function filteredCandidates() {
  const q = document.getElementById('search-box').value.toLowerCase();
  const project = document.getElementById('project-filter').value;
  const progress = document.getElementById('progress-filter').value;
  return CANDIDATES.filter(c => {
    if (project && c.project !== project) return false;
    if (progress !== 'all' && c.progress !== progress) return false;
    if (q) {
      const hay = [c.name, c.current_company, c.current_title, c.headline, c.email, c.project, c.projects.join(' '), c.source].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function renderList() {
  const list = document.getElementById('candidate-list');
  const filtered = filteredCandidates();
  if (!filtered.find(c => c.vanity === currentVanity)) currentVanity = filtered[0]?.vanity || null;

  const rowsHtml = filtered.map(c => {
    const d = decisions[c.vanity];
    const dotCls = d.action === 'fit' ? 'fit' : d.action === 'unfit' ? 'unfit' : c.email_status === 'verified' ? 'email' : '';
    const selCls = c.vanity === currentVanity ? ' selected' : '';
    const email = c.email || emailLabels[c.email_status] || '';
    const history = compactHistory(c.positions);
    return `<div class="table-row${selCls}" onclick="selectCandidate('${c.vanity}')">
      <div class="cell-main">
        <div class="cand-name">${esc(c.name)}</div>
        <div class="cand-sub" title="${esc(history)}">${esc(history)}</div>
      </div>
      <div class="cell-project" title="${esc(projectOptionText(c.project))}">${esc(shortProject(c.project))} · ${esc(formatProjectDate(c.project))}</div>
      <div class="cell-progress ${esc(c.progress)}">${esc(progressLabels[c.progress])}</div>
      <div class="cell-score">${esc(c.score)}</div>
      <div class="cell-company optional-col" title="${esc(c.current_company)}">${esc(c.current_company)}</div>
      <div class="cell-history optional-col" title="${esc(history)}">${esc(history)}</div>
      <div class="cell-email optional-col" title="${esc(email)}">${esc(email)}</div>
      <div class="cell-link optional-col"><a href="${esc(c.profile_url)}" target="_blank" onclick="event.stopPropagation()">LinkedIn</a></div>
      <div class="status-dot ${dotCls}"></div>
    </div>`;
  }).join('');
  list.innerHTML = `<div class="candidate-table">
    <div class="table-head"><div>候选人</div><div>项目</div><div>进度</div><div>AI评分</div><div class="optional-col">所在公司</div><div class="optional-col">履历简版</div><div class="optional-col">邮箱</div><div class="optional-col">链接</div><div></div></div>
    ${rowsHtml || '<div class="empty" style="height:120px;background:#fff">没有符合筛选的人选</div>'}
  </div>`;

  document.getElementById('result-count').textContent = `${filtered.length} / ${CANDIDATES.length}`;
  document.getElementById('active-view-label').textContent = '候选人表格';
  updateCounts();
  if (currentVanity) renderDetail(currentVanity);
  else document.getElementById('detail').className = 'empty', document.getElementById('detail').innerHTML = '没有符合筛选的人选';
}

function selectCandidate(vanity) {
  currentVanity = vanity;
  renderDetail(vanity);
  renderListOnlySelection();
}

function renderListOnlySelection() {
  document.querySelectorAll('.table-row').forEach(item => item.classList.remove('selected'));
  const nodes = [...document.querySelectorAll('.table-row')];
  const idx = filteredCandidates().findIndex(c => c.vanity === currentVanity);
  if (idx >= 0 && nodes[idx]) nodes[idx].classList.add('selected');
}

function renderDetail(vanity) {
  const c = CANDIDATES.find(x => x.vanity === vanity);
  if (!c) return;
  const d = decisions[vanity];
  const profileUrl = c.profile_url || `https://www.linkedin.com/in/${vanity}`;
  const pos = c.positions || [];
  const totalYrs = (() => {
    const starts = pos.map(p => p.startYear).filter(Boolean);
    return starts.length ? new Date().getFullYear() - Math.min(...starts) : 0;
  })();
  const submetaParts = [[c.current_title, c.current_company].filter(Boolean).join(' @ '), totalYrs ? `${totalYrs}yr` : ''].filter(Boolean).join(' · ');
  const dims = c.scores_breakdown || [];
  const dimLabels = { company_match:'公司', topic_depth:'岗位', seniority_focus:'目标岗时长', target_role_duration:'目标岗时长', bonus:'加分' };
  const scoreHtml = dims.map((dim, i) => {
    const sc = dim.score ?? 0;
    const cls = sc >= 75 ? 'high' : sc >= 50 ? 'mid' : 'low';
    const dot = i < dims.length - 1 ? '<span class="score-dot">·</span>' : '';
    return `<span class="score-seg"><span class="s-label">${esc(dimLabels[dim.key] || dim.key)} </span><span class="s-val ${cls}">${sc}</span></span>${dot}`;
  }).join('');
  const matchedHtml = (c.matched_signals || []).map(s =>
    `<div class="signal-line match"><span class="signal-icon">✓</span><span class="signal-text">${esc(s)}</span></div>`
  ).join('');
  const missedHtml = (c.missed_signals || []).map(s =>
    `<div class="signal-line miss"><span class="signal-icon">✗</span><span class="signal-text">${esc(s)}</span></div>`
  ).join('');
  const expHtml = pos.map(p => {
    const start = p.startYear || '?';
    const end = p.endYear || '至今';
    const dur = ((p.endYear || new Date().getFullYear()) - (p.startYear || new Date().getFullYear()));
    const durStr = dur > 0 ? ` (${dur}yr)` : '';
    const desc = p.desc ? `<div class="exp-desc" title="${esc(p.desc)}">${esc(p.desc)}</div>` : '';
    return `<div class="exp-item">
      <div class="exp-icon"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg></div>
      <div class="exp-body">
        <div class="exp-company">${esc(p.company || '')}</div>
        <div class="exp-title">${esc(p.title || '')}</div>
        <div class="exp-period">${start} – ${end}${durStr}</div>
        ${desc}
      </div>
    </div>`;
  }).join('');
  const fitActive = d.action === 'fit' ? ' active' : '';
  const pendingActive = d.action === 'pending' ? ' active' : '';
  const unfitActive = d.action === 'unfit' ? ' active' : '';
  const emailDisplay = c.email || emailLabels[c.email_status] || '待索取';
  const commentHtml = `<div class="comment-bar"><input class="comment-input" id="comment-input" placeholder="备注，回车确认" onkeydown="onCommentKeydown(event)"></div>`;
  const progressSelectHtml = `<select class="progress-select" onchange="setProgressFromSelect(this.value)">${progressOrder.map(key => `<option value="${esc(key)}" ${key === c.progress ? 'selected' : ''}>${esc(progressLabels[key])}</option>`).join('')}</select>`;
  const otherRecords = libraryOtherRecords(c, d);
  const otherRecordsHtml = otherRecords.length ? `<div class="section">
      <div class="section-title">库内其他记录</div>
      <div class="library-records">${otherRecords.map(record => {
        if (record.type === 'remark') {
          return `<div class="library-record remark"><div class="record-body"><span class="record-label">备注</span>${esc(record.text)}<div class="record-time">${esc(formatCommentTime(record.createdAt))}</div></div><button class="record-remove" onclick="removeCommentTag(${record.index})" title="删除备注">×</button></div>`;
        }
        return `<div class="library-record">${esc(record.text)}</div>`;
      }).join('')}</div>
    </div>` : '';

  document.getElementById('detail').className = '';
  document.getElementById('detail').innerHTML = `
    <div class="detail-header">
      <span class="detail-name">${esc(c.name)}</span>
      <a href="${profileUrl}" target="_blank" class="li-link">LinkedIn ↗</a>
      <span class="header-email">邮箱 ${esc(emailDisplay)}</span>
      <div class="header-actions">
        <div class="action-stack">
          <div class="action-row">
            <button class="btn-connect${fitActive}" onclick="setAction('fit')">合适</button>
            <button class="btn-pending${pendingActive}" onclick="setAction('pending')">待定</button>
            <button class="btn-reject${unfitActive}" onclick="setAction('unfit')">不合适</button>
          </div>
          <div class="status-comment-row">
            ${progressSelectHtml}
            ${commentHtml}
          </div>
        </div>
      </div>
    </div>
    <div class="detail-submeta">${esc(submetaParts)}</div>

    <div class="section connect-section">
      <textarea id="connect-msg" onkeyup="onMsgEdit()">${esc(d.note)}</textarea>
      <div class="char-count" id="char-count">${d.note.length}/290</div>
    </div>

    ${otherRecordsHtml}

    ${dims.length || matchedHtml || missedHtml ? `<div class="two-col">
      ${dims.length ? `<div class="section">
        <div class="section-title">匹配度</div>
        <div class="score-inline">${scoreHtml}</div>
        ${c.reasoning ? `<div class="reasoning">${esc(c.reasoning)}</div>` : ''}
      </div>` : ''}
      ${matchedHtml || missedHtml ? `<div class="section">
        <div class="section-title">命中 / 缺失信号</div>
        ${matchedHtml}${missedHtml}
      </div>` : ''}
    </div>` : ''}

    ${pos.length ? `<div class="section">
      <div class="section-title">工作经历</div>
      <div class="exp-list">${expHtml}</div>
    </div>` : ''}
  `;
  updateCharCount();
}

function toggleDetail() {
  const main = document.getElementById('main');
  const collapsed = main.classList.toggle('detail-collapsed');
  document.getElementById('toggle-detail').textContent = collapsed ? '展开详情' : '收起详情';
}

function togglePanel(head) {
  head.closest('.panel')?.classList.toggle('collapsed');
}

function setProgressFromSelect(key) {
  if (!currentVanity) return;
  const c = CANDIDATES.find(x => x.vanity === currentVanity);
  if (!c || !progressLabels[key]) return;
  c.progress = key;
  c.connect_status = progressLabels[key];
  renderList();
}

function filterList() { renderList(); }

function setAction(action) {
  if (!currentVanity) return;
  const d = decisions[currentVanity];
  d.action = action;
  const ta = document.getElementById('connect-msg');
  if (ta) d.note = ta.value;
  renderDetail(currentVanity);
  renderList();
}

function onMsgEdit() {
  if (!currentVanity) return;
  const ta = document.getElementById('connect-msg');
  decisions[currentVanity].note = ta.value;
  decisions[currentVanity].edited = true;
  updateCharCount();
}

function onCommentKeydown(event) {
  if (event.key !== 'Enter') return;
  event.preventDefault();
  const input = event.currentTarget;
  const text = input.value.replace(/^#+/, '').trim();
  if (!text || !currentVanity) return;
  const tags = decisions[currentVanity].tags || (decisions[currentVanity].tags = []);
  const exists = tags.some(tag => normalizeCommentTag(tag).text === text);
  if (!exists) tags.push({ text, createdAt: new Date().toISOString() });
  input.value = '';
  renderDetail(currentVanity);
}

function removeCommentTag(index) {
  if (!currentVanity) return;
  const tags = decisions[currentVanity].tags || [];
  tags.splice(index, 1);
  renderDetail(currentVanity);
}

function updateCharCount() {
  const ta = document.getElementById('connect-msg');
  const cc = document.getElementById('char-count');
  if (!ta || !cc) return;
  const n = ta.value.length;
  cc.textContent = `${n}/290`;
  cc.className = 'char-count' + (n > 290 ? ' over' : n > 260 ? ' warn' : '');
}

function updateCounts() {
  const vals = Object.values(decisions);
  document.getElementById('cnt-fit').textContent = vals.filter(d => d.action === 'fit').length;
  document.getElementById('cnt-pending').textContent = vals.filter(d => d.action === 'pending').length;
  document.getElementById('cnt-unfit').textContent = vals.filter(d => d.action === 'unfit').length;
}

function clearAll() {
  CANDIDATES.forEach(c => { decisions[c.vanity].action = 'pending'; });
  if (currentVanity) renderDetail(currentVanity);
  renderList();
}

function copyFitList() {
  const list = CANDIDATES.filter(c => decisions[c.vanity]?.action === 'fit').map(c => c.vanity).join('\n');
  if (!list) { showToast('没有标记合适的人选'); return; }
  navigator.clipboard.writeText(list).then(() => showToast(`已复制 ${list.split('\n').length} 人`));
}

function exportDecisions() {
  const visible = new Set(filteredCandidates().map(c => c.vanity));
  const data = {
    batch_id:'candidate_library_demo',
    version:3,
    exported_at:new Date().toISOString(),
    filters:{
      project:document.getElementById('project-filter').value,
      progress:document.getElementById('progress-filter').value,
      q:document.getElementById('search-box').value
    },
    decisions:CANDIDATES.filter(c => visible.has(c.vanity)).map(c => {
      const d = decisions[c.vanity];
      return { vanity:c.vanity, action:d.action, project:c.project, progress:c.progress, email:c.email, remarks:(d.tags || []).map(normalizeCommentTag), note:d.action === 'fit' ? d.note : undefined, edited:d.edited };
    })
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'candidate_library_demo_decisions.json';
  a.click();
  showToast('当前视图 JSON 已下载');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function shortProject(project) {
  return String(project || '').replace(/ Channel Check| Consumption| Progress| Optical Modules| Sourcing| SI/g, '').trim() || project;
}
function projectDateText(project) {
  return projectDates[project] || '日期待补充';
}
function formatProjectDate(project) {
  const date = projectDateText(project);
  return date.length === 10 ? date.slice(5) : date;
}
function projectOptionText(project) {
  return `${shortProject(project)} · ${projectDateText(project)}`;
}
function compactHistory(positions) {
  return (positions || [])
    .slice(0, 2)
    .map(p => [p.company, p.title].filter(Boolean).join(' · '))
    .filter(Boolean)
    .join(' / ');
}
function libraryOtherRecords(c, decision) {
  const projectRecords = (c.projects || [])
    .filter(project => project !== c.project)
    .map(project => ({ type:'project', text:`${project} · ${progressLabels[c.progress] || c.connect_status || ''}` }));
  const remarkRecords = (decision?.tags || []).map((tag, index) => ({ type:'remark', index, ...normalizeCommentTag(tag) }));
  return [...projectRecords, ...remarkRecords];
}
function normalizeCommentTag(tag) {
  if (typeof tag === 'string') return { text:tag, createdAt:'' };
  return { text:tag?.text || '', createdAt:tag?.createdAt || '' };
}
function formatCommentTime(iso) {
  if (!iso) return '刚刚';
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return iso;
  const pad = n => String(n).padStart(2, '0');
  return `${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function unique(arr) { return [...new Set(arr)].sort(); }
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return esc(s).replace(/'/g,'&#39;');
}

window.demoApi = { CANDIDATES, decisions, filteredCandidates };
init();
</script>
